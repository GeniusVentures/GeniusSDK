name: Release Build CI

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - ".github/**"
      - "Readme.md"
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - ".github/**"
      - "Readme.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: false
        type: string
permissions:
  contents: write
  packages: read
jobs:
  build:
    env:
      GRPC_BUILD_ENABLE_CCACHE: "ON"
      GH_TOKEN: ${{ secrets.GNUS_TOKEN_1 }}
    runs-on: ${{matrix.host}}
    container:
      image: ${{matrix.container}}
      credentials:
        username: ${{github.actor}}
        password: ${{secrets.GNUS_TOKEN_1}}
    strategy:
      fail-fast: false
      matrix:
        target: [Android, iOS, OSX, Linux, Windows]
        build-type: [Debug, Release]
        abi: [""]
        include:
          - target: Linux
            host: sg-ubuntu-linux
            abi: "x86_64"
            build-type: "Release"
            container: ghcr.io/geniusventures/debian-bullseye:latest
          - target: Linux
            host: sg-ubuntu-linux
            abi: "x86_64"
            build-type: "Debug"
            container: ghcr.io/geniusventures/debian-bullseye:latest
          - target: Linux
            host: sg-arm-linux
            abi: "aarch64"
            build-type: "Release"
            container: ghcr.io/geniusventures/debian-bullseye:latest
          - target: Linux
            host: sg-arm-linux
            abi: "aarch64"
            build-type: "Debug"
            container: ghcr.io/geniusventures/debian-bullseye:latest
          - target: Windows
            host: SG-WIN11
          - target: OSX
            host: gv-OSX-Large
          - target: Android
            host: sg-ubuntu-linux
            abi: arm64-v8a
            build-type: "Release"
          - target: Android
            host: sg-ubuntu-linux
            abi: arm64-v8a
            build-type: "Debug"
          - target: Android
            host: sg-ubuntu-linux
            abi: armeabi-v7a
            build-type: "Release"
          - target: Android
            host: sg-ubuntu-linux
            abi: armeabi-v7a
            build-type: "Debug"
          - target: iOS
            host: gv-OSX-Large
        exclude:
          - target: Android
            abi: ""
          - target: Linux
            abi: ""
    steps:
      - name: Configure bash on Windows (use Git Bash, not WSL)
        if: ${{ runner.environment == 'self-hosted' && matrix.target == 'Windows' }}
        run: |
          $gitUsrBinPath = "C:\Program Files\Git\usr\bin"
          $gitBinPath = "C:\Program Files\Git\bin"

          foreach ($p in @($gitBinPath, $gitUsrBinPath)) {
            if (Test-Path $p) {
              Add-Content -Path $env:GITHUB_PATH -Value $p
              $env:PATH = "$p;$env:PATH"
            }
          }

          Write-Output "Git Bash configured for bash shell commands"
          $bashLocation = (Get-Command bash.exe -ErrorAction SilentlyContinue).Source
          if ($bashLocation) {
            Write-Output "Bash location: $bashLocation"
          } else {
            Write-Output "WARNING: bash.exe not found in PATH"
          }

      - name: Clean workspace (self-hosted runners)
        if: ${{ runner.environment == 'self-hosted' }}
        shell: bash
        run: |
          # Use sudo on Linux to handle root-owned files left by container jobs
          SUDO=""
          if [ "$(uname)" = "Linux" ]; then
            SUDO="sudo"
          fi

          echo "=== PRE-CLEANUP DEBUG ==="
          echo "Current working directory: $(pwd)"
          echo "Workspace: ${{github.workspace}}"

          if [ -d "${{github.workspace}}" ]; then
            cd "${{github.workspace}}"
            echo "Changed to workspace directory: $(pwd)"
            echo "Contents:"
            ls -la

            if [ -d ".git" ]; then
              echo "Git repository detected, performing deep clean..."
              # Remove stale lock files first
              echo "Removing stale git lock files..."
              find . -name "index.lock" -type f -delete 2>/dev/null || true
              find . -name "*.lock" -path "*/.git/*" -type f -delete 2>/dev/null || true

              git clean -xfd
              git submodule foreach --recursive git clean -xfd
              git reset --hard
              git submodule foreach --recursive git reset --hard
              echo "Git clean completed"
            else
              echo "Not a git repository, skipping git clean"
            fi
          else
            echo "Workspace directory does not exist yet, skipping cleanup"
          fi

          echo "=== CLEANUP ARTIFACTS ==="
          # Clean up artifacts from previous runs (self-hosted runners only)
          for dir in thirdparty zkLLVM SuperGenius GeniusSDK; do
            if [ -d "$dir" ]; then
              echo "Removing $dir directory..."
              $SUDO rm -rf "$dir"
            fi
          done

          echo "=== POST-CLEANUP DEBUG ==="
          if [ -d "${{github.workspace}}" ]; then
            cd "${{github.workspace}}"
            echo "Final workspace contents:"
            ls -la
          fi

      - name: Checkout GeniusSDK
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: "GeniusSDK"
          submodules: "recursive"
          persist-credentials: true # Required for uploading the release later

      - name: Set build directory
        shell: bash
        run: |
          if [ '${{matrix.abi}}' ]; then
            BUILD_DIRECTORY=build/${{matrix.target}}/${{matrix.build-type}}/${{matrix.abi}}
          else
            BUILD_DIRECTORY=build/${{matrix.target}}/${{matrix.build-type}}
          fi
          echo "BUILD_DIRECTORY=$BUILD_DIRECTORY" >> $GITHUB_ENV

      - name: Download thirdparty release
        working-directory: ${{github.workspace}}
        shell: bash
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Determine current branch or tag
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${GITHUB_EVENT_INPUTS_TAG}" ]; then
              CURRENT_BRANCH="${GITHUB_EVENT_INPUTS_TAG}"
              IS_TAG=true
          elif ${{github.event_name == 'pull_request'}}; then
              CURRENT_BRANCH=${GITHUB_EVENT_PULL_REQUEST_HEAD_REF}
              IS_TAG=false
          else
              CURRENT_BRANCH=$GITHUB_REF_NAME
              IS_TAG=false
          fi

          echo "Identified current branch/tag as ${CURRENT_BRANCH}"
          echo "CURRENT_BRANCH=${CURRENT_BRANCH}" >>$GITHUB_ENV
          echo "IS_TAG=${IS_TAG}" >>$GITHUB_ENV

          # Determine thirdparty branch to use
          if [ "$IS_TAG" == "true" ]; then
            # For tags, use the exact tag name for thirdparty
            thirdparty_branch="$CURRENT_BRANCH"
          elif [ "$CURRENT_BRANCH" == "main" ]; then
            thirdparty_branch="main"
          else
            thirdparty_branch="develop"
          fi

          echo "Using ${thirdparty_branch} for thirdparty"

          if [ '${{matrix.abi}}' ]; then
            FILE_NAME=${{matrix.target}}-${{matrix.abi}}-${{matrix.build-type}}.tar.gz
          else
            FILE_NAME=${{matrix.target}}-${{matrix.build-type}}.tar.gz
          fi
          echo "FILE_NAME=${FILE_NAME}" >> $GITHUB_ENV

          mkdir thirdparty
          cd thirdparty

          if [ "$IS_TAG" == "true" ]; then
            # For tags, use just the tag name
            tag_name="${thirdparty_branch}"
          else
            # For branches, use the platform-branch-buildtype format
            if [ '${{matrix.abi}}' ]; then
              tag_name="${{matrix.target}}-${{matrix.abi}}-${thirdparty_branch}-${{matrix.build-type}}"
            else
              tag_name="${{matrix.target}}-${thirdparty_branch}-${{matrix.build-type}}"
            fi
          fi

          gh release download ${tag_name} --repo GeniusVentures/thirdparty -p "${FILE_NAME}"
          tar -zxf "${FILE_NAME}"

          # Set THIRDPARTY_BUILD_DIR to the actual location where files were extracted

          if [ "${{ matrix.target }}" = "Windows" ]; then
            # Convert Unix path to Windows path for Windows builds
            echo "THIRDPARTY_BUILD_DIR=$(pwd -W)/${BUILD_DIRECTORY}" >> $GITHUB_ENV
          else
            echo "THIRDPARTY_BUILD_DIR=$(pwd)/${BUILD_DIRECTORY}" >> $GITHUB_ENV
          fi

      - name: Download zkLLVM release
        working-directory: ${{github.workspace}}
        shell: bash
        run: |
          # Use same branch determination logic for zkLLVM
          if [ "$IS_TAG" == "true" ]; then
            # For tags, use the exact tag name for zkLLVM
            zkLLVM_branch="$CURRENT_BRANCH"
          elif [ "$CURRENT_BRANCH" == "main" ]; then
            zkLLVM_branch="main"
          else
            zkLLVM_branch="develop"
          fi

          mkdir zkLLVM
          cd zkLLVM

          if [ "${{ matrix.target }}" = "Windows" ]; then
              ZKLLVM_FILE_NAME=${{matrix.target}}-${{matrix.build-type}}.tar.gz
              ZKLLVM_BUILD_DIR=build/${{matrix.target}}/${{matrix.build-type}}
              if [ "$IS_TAG" == "true" ]; then
                tag_name="${zkLLVM_branch}"
              else
                tag_name=${{matrix.target}}-${zkLLVM_branch}-${{matrix.build-type}}
              fi
          elif [ '${{matrix.abi}}' ]; then
              ZKLLVM_FILE_NAME=${{matrix.target}}-${{matrix.abi}}-Release.tar.gz
              ZKLLVM_BUILD_DIR=build/${{matrix.target}}/Release/${{matrix.abi}}
              if [ "$IS_TAG" == "true" ]; then
                tag_name="${zkLLVM_branch}"
              else
                tag_name=${{matrix.target}}-${{matrix.abi}}-${zkLLVM_branch}-Release
              fi
          else
              ZKLLVM_FILE_NAME=${{matrix.target}}-Release.tar.gz
              ZKLLVM_BUILD_DIR=build/${{matrix.target}}/Release
              if [ "$IS_TAG" == "true" ]; then
                tag_name="${zkLLVM_branch}"
              else
                tag_name=${{matrix.target}}-${zkLLVM_branch}-Release
              fi
          fi

          gh release download ${tag_name} --repo GeniusVentures/zkLLVM -p "${ZKLLVM_FILE_NAME}"

          tar --exclude='*bin/assigner' --exclude='*bin/clang-zkllvm' --exclude='*bin/llvm-link-zkllvm' --exclude='*bin/transpiler' -zxf "${ZKLLVM_FILE_NAME}"

          # Set ZKLLVM_BUILD_DIR to the actual location where files were extracted

          if [ "${{ matrix.target }}" = "Windows" ]; then
            # Convert Unix path to Windows path for Windows builds
            echo "ZKLLVM_BUILD_DIR=$(pwd -W)/${ZKLLVM_BUILD_DIR}" >> $GITHUB_ENV
          else
            echo "ZKLLVM_BUILD_DIR=$(pwd)/${ZKLLVM_BUILD_DIR}" >> $GITHUB_ENV
          fi

      - name: Download SuperGenius
        shell: bash
        run: |
          # Use same branch determination logic for SuperGenius
          if [ "$IS_TAG" == "true" ]; then
            # For tags, use the exact tag name for SuperGenius
            sgns_branch="$CURRENT_BRANCH"
          elif [ "$CURRENT_BRANCH" == "main" ]; then
            sgns_branch="main"
          else
            sgns_branch="develop"
          fi

          echo "Using ${sgns_branch} branch/tag from SuperGenius"

          mkdir SuperGenius
          cd SuperGenius

          if [ "$IS_TAG" == "true" ]; then
            # For tags, use just the tag name
            tag_name="${sgns_branch}"
          else
            # For branches, use the platform-branch-buildtype format
            if [ '${{matrix.abi}}' ]; then
              tag_name="${{matrix.target}}-${{matrix.abi}}-${sgns_branch}-${{matrix.build-type}}"
            else
              tag_name="${{matrix.target}}-${sgns_branch}-${{matrix.build-type}}"
            fi
          fi

          gh release download ${tag_name} --repo GeniusVentures/SuperGenius -p "${FILE_NAME}"

          tar -xzf "${FILE_NAME}"

          if [ "${{ matrix.target }}" = "Windows" ]; then
            # Convert Unix path to Windows path for Windows builds
            echo "SUPERGENIUS_DIR=$(pwd -W)" >> $GITHUB_ENV
          else
            echo "SUPERGENIUS_DIR=$(pwd)" >> $GITHUB_ENV
          fi

      - name: Configure Linux host
        if: ${{ runner.os == 'Linux'}}
        run: |
          sudo update-alternatives --install /usr/bin/cc cc $(which clang) 100
          sudo update-alternatives --install /usr/bin/c++ c++ $(which clang++) 100
          sudo update-alternatives --set cc $(which clang)
          sudo update-alternatives --set c++ $(which clang++)

          sudo apt install ccache ninja-build libvulkan-dev libzstd-dev libsecret-1-dev -y
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      - name: Configure Windows host
        if: ${{ runner.os == 'Windows'}}
        run: |
          choco install ccache -A

      - name: Configure macOS host
        if: ${{ runner.os == 'macOS'}}
        run: |
          brew install ninja bash gnu-tar

          # Ensure GNU tar is first in PATH - check both possible Homebrew locations
          if [ -d "/opt/homebrew/opt/gnu-tar/libexec/gnubin" ]; then
            echo "PATH=/opt/homebrew/opt/gnu-tar/libexec/gnubin:$PATH" >> $GITHUB_ENV
            echo "Using GNU tar from /opt/homebrew"
          elif [ -d "/usr/local/opt/gnu-tar/libexec/gnubin" ]; then
            echo "PATH=/usr/local/opt/gnu-tar/libexec/gnubin:$PATH" >> $GITHUB_ENV
            echo "Using GNU tar from /usr/local"
          else
            echo "WARNING: GNU tar installation not found in expected locations"
            echo "Available tar: $(which tar)"
          fi

          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      - name: Add Android toolchain
        if: ${{ matrix.target == 'Android' }}
        run: |
          NDK_VERSION="r27b"
          NDK_DIR="$HOME/android-ndk-$NDK_VERSION"
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading Android NDK $NDK_VERSION..."
            wget https://dl.google.com/android/repository/android-ndk-$NDK_VERSION-linux.zip -O ndk.zip
            unzip -o ndk.zip -d $HOME
            rm ndk.zip
          else
            echo "Android NDK already exists at $NDK_DIR, skipping download"
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Configure CMake for Android
        if: ${{ matrix.target == 'Android'}}
        working-directory: ${{github.workspace}}/GeniusSDK
        run: cmake -S build/${{matrix.target}} -B $BUILD_DIRECTORY -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DANDROID_ABI=${{matrix.abi}} -DTHIRDPARTY_BUILD_DIR=${{env.THIRDPARTY_BUILD_DIR}} -DZKLLVM_BUILD_DIR=${{env.ZKLLVM_BUILD_DIR}} -DSUPERGENIUS_DIR=${{env.SUPERGENIUS_DIR}}

      - name: Configure CMake for Mac
        if: ${{ matrix.target == 'OSX'}}
        working-directory: ${{github.workspace}}/GeniusSDK
        run: cmake -S build/${{matrix.target}} -B $BUILD_DIRECTORY -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DPLATFORM=MAC_UNIVERSAL -DTHIRDPARTY_BUILD_DIR=${{env.THIRDPARTY_BUILD_DIR}} -DZKLLVM_BUILD_DIR=${{env.ZKLLVM_BUILD_DIR}} -DSUPERGENIUS_DIR=${{env.SUPERGENIUS_DIR}}

      - name: Configure CMake for iOS
        if: ${{ matrix.target == 'iOS'}}
        working-directory: ${{github.workspace}}/GeniusSDK
        run: cmake -S build/${{matrix.target}} -B $BUILD_DIRECTORY -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DPLATFORM=OS64 -DTHIRDPARTY_BUILD_DIR=${{env.THIRDPARTY_BUILD_DIR}} -DZKLLVM_BUILD_DIR=${{env.ZKLLVM_BUILD_DIR}} -DSUPERGENIUS_DIR=${{env.SUPERGENIUS_DIR}}

      - name: Configure CMake for Linux
        if: ${{matrix.target == 'Linux'}}
        working-directory: ${{github.workspace}}/GeniusSDK
        run: cmake -S build/${{matrix.target}} -B $BUILD_DIRECTORY -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DTHIRDPARTY_BUILD_DIR=${{env.THIRDPARTY_BUILD_DIR}} -DZKLLVM_BUILD_DIR=${{env.ZKLLVM_BUILD_DIR}} -DSUPERGENIUS_DIR=${{env.SUPERGENIUS_DIR}} -DABI_SUBFOLDER_NAME='/${{matrix.abi}}'

      - name: Configure CMake for Windows
        if: ${{matrix.target == 'Windows'}}
        working-directory: ${{github.workspace}}/GeniusSDK
        run: cmake -S build/${{matrix.target}} -B $env:BUILD_DIRECTORY -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DTHIRDPARTY_BUILD_DIR=${{env.THIRDPARTY_BUILD_DIR}} -DZKLLVM_BUILD_DIR=${{env.ZKLLVM_BUILD_DIR}} -DSUPERGENIUS_DIR=${{env.SUPERGENIUS_DIR}}

      - name: Build GeniusSDK
        working-directory: ${{github.workspace}}/GeniusSDK/${{env.BUILD_DIRECTORY}}
        shell: bash
        run: cmake --build . --config ${{matrix.build-type}} -j

      - name: Install GeniusSDK
        working-directory: ${{github.workspace}}/GeniusSDK/${{env.BUILD_DIRECTORY}}
        run: cmake --install . --config ${{matrix.build-type}}

      - name: Compress build artifacts
        working-directory: ${{github.workspace}}/GeniusSDK/${{env.BUILD_DIRECTORY}}
        if: github.ref_name == 'main' || github.ref_name == 'develop' || env.IS_TAG == 'true'
        shell: bash
        run: |
          tar --exclude=.git -czvf ${FILE_NAME} --transform 's|^|${{env.BUILD_DIRECTORY}}/|' GeniusSDK/

      - name: Set release tag
        shell: bash
        run: |
          if ${{ github.event_name == 'workflow_dispatch' }} && [ '${{ github.event.inputs.tag }}' ]; then
              RELEASE_TAG="${{ github.event.inputs.tag }}"
              IS_TAG_RELEASE="true"
          else
              if [ '${{matrix.abi}}' ]; then
                RELEASE_TAG="${{ matrix.target }}-${{matrix.abi}}-${GITHUB_REF_NAME}-${{ matrix.build-type }}"
              else
                RELEASE_TAG="${{ matrix.target }}-${GITHUB_REF_NAME}-${{ matrix.build-type }}"
              fi
              IS_TAG_RELEASE="false"
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "IS_TAG_RELEASE=$IS_TAG_RELEASE" >> $GITHUB_ENV

      - name: Create release tag
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        working-directory: ${{github.workspace}}/GeniusSDK
        id: create-release-tag
        shell: bash
        run: |
          echo "Checking if release $RELEASE_TAG exists..."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              if [ "$IS_TAG_RELEASE" == "false" ]; then
                  echo "Deleting existing release/tag $RELEASE_TAG..."
                  gh release delete "$RELEASE_TAG" --yes || true
                  git push origin ":refs/tags/$RELEASE_TAG" || true
                  git tag -d "$RELEASE_TAG" || true
              fi
          fi

          echo "Creating new tag $RELEASE_TAG..."
          git tag -f "$RELEASE_TAG" "${{ github.sha }}"
          git push origin "$RELEASE_TAG" --force

          echo "Creating GitHub release $RELEASE_TAG..."
          gh release create "$RELEASE_TAG" \
          --target "${{ github.sha }}" \
          -t "${{ matrix.target }} ${GITHUB_REF_NAME} ${{ matrix.build-type }} build" \
          -n "Branch: ${GITHUB_REF_NAME} | SHA: ${{ github.sha }}" \
          $( [ "$IS_TAG_RELEASE" = "true" ] && echo "" || echo "--prerelease" )

      - name: Upload file
        if: github.ref_name == 'main' || github.ref_name == 'develop' || env.IS_TAG == 'true'
        working-directory: ${{github.workspace}}/GeniusSDK/
        shell: bash
        run: gh release upload ${RELEASE_TAG} "${BUILD_DIRECTORY}/${FILE_NAME}" --clobber
